<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor PDF — Treballs de Recerca</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #1a1a2e;
    }
    .visor-cap {
      background: #7a1a3a;
      color: #fff;
      padding: .6rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }
    .btn-tornar {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      padding: .4rem .9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .88rem;
      font-family: inherit;
      white-space: nowrap;
      transition: background .15s;
      text-decoration: none;
    }
    .btn-tornar:hover { background: rgba(255,255,255,.28); }
    .visor-titol {
      font-size: .95rem;
      font-weight: 600;
      opacity: .9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }
    .visor-error {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.5);
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="visor-cap">
    <button class="btn-tornar" onclick="history.back()">&#8592; Tornar</button>
    <span class="visor-titol" id="visor-titol">Treballs de Recerca</span>
  </div>
  <div class="visor-error" id="visor-error" style="display:none">
    No s'ha pogut carregar el document.
  </div>
  <iframe id="visor-iframe" allowfullscreen></iframe>

  <script>
    const params = new URLSearchParams(location.search);
    const pdfUrl = params.get('url') || '';
    const titol  = params.get('titol') || '';

    if (titol) {
      document.getElementById('visor-titol').textContent = titol;
      document.title = titol + ' — Treballs de Recerca';
    }

    if (pdfUrl) {
      const m = pdfUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || pdfUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      const src = m
        ? 'https://drive.google.com/file/d/' + m[1] + '/preview'
        : 'https://docs.google.com/viewer?url=' + encodeURIComponent(pdfUrl) + '&embedded=true';
      document.getElementById('visor-iframe').src = src;
    } else {
      document.getElementById('visor-iframe').style.display = 'none';
      document.getElementById('visor-error').style.display = 'flex';
    }
  </script>
</body>
</html>
