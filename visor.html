<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor PDF — Treballs de Recerca</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f4f6f9;
    }

    /* Capçalera burdeos */
    .visor-cap {
      background: #7a1a3a;
      color: #fff;
      padding: .85rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-shrink: 0;
    }

    .btn-tornar {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      padding: .45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .88rem;
      font-family: inherit;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .15s;
    }
    .btn-tornar:hover { background: rgba(255,255,255,.28); }

    .visor-info {
      flex: 1;
      min-width: 0;
    }

    .visor-titol {
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
    }

    .visor-meta {
      font-size: .8rem;
      color: rgba(255,255,255,.65);
      margin-top: .15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .visor-logo {
      height: 48px;
      width: auto;
      mix-blend-mode: screen;
      opacity: .85;
      flex-shrink: 0;
    }

    /* Iframe ocupa tota la resta */
    .visor-contenidor {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .visor-iframe {
      position: absolute;
      top: 0;
      left: 0;
      /* 52px extra a la dreta per amagar la icona de Google Drive */
      width: calc(100% + 52px);
      height: 100%;
      border: none;
      display: block;
    }

    /* Impedeix impressió */
    @media print { body { display: none !important; } }

    .avis-mobil {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 1.25rem;
      padding: 2rem;
      text-align: center;
      color: #5a6a7e;
    }

    .avis-mobil svg {
      color: #7a1a3a;
      opacity: .7;
    }

    .avis-mobil strong {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: .25rem;
    }

    .avis-mobil p {
      font-size: .92rem;
      line-height: 1.6;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div class="visor-cap">
    <button class="btn-tornar" onclick="history.back()">&#8592; Tornar</button>
    <div class="visor-info">
      <p class="visor-titol" id="visor-titol">Treballs de Recerca</p>
      <p class="visor-meta"  id="visor-meta"></p>
    </div>
    <img src="img/logo.png" alt="INS Apel·les Mestres" class="visor-logo">
  </div>
  <div class="visor-contenidor" id="visor-contenidor">
    <iframe id="visor-iframe" class="visor-iframe"
      sandbox="allow-scripts allow-same-origin allow-forms"
      allowfullscreen></iframe>
  </div>
  <div class="avis-mobil" id="avis-mobil">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <line x1="12" y1="18" x2="12" y2="18.5" stroke-linecap="round" stroke-width="2"/>
    </svg>
    <p><strong>Dispositiu no compatible</strong>
      Els treballs de recerca només es poden visualitzar des d'un ordinador.
    </p>
  </div>

  <script>
    const p       = new URLSearchParams(location.search);
    const pdfUrl  = p.get('url')   || '';
    const titol   = p.get('titol') || '';
    const autor   = p.get('autor') || '';
    const tutor   = p.get('tutor') || '';

    if (titol) {
      document.getElementById('visor-titol').textContent = titol;
      document.title = titol + ' — Treballs de Recerca';
    }

    const parts = [autor && 'Autor/a: ' + autor, tutor && 'Tutor/a: ' + tutor].filter(Boolean);
    if (parts.length) document.getElementById('visor-meta').textContent = parts.join('  ·  ');

    if (window.innerWidth < 768) {
      document.getElementById('visor-contenidor').style.display = 'none';
      document.getElementById('avis-mobil').style.display = 'flex';
    } else if (pdfUrl) {
      const m   = pdfUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || pdfUrl.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      const src = m
        ? 'https://drive.google.com/file/d/' + m[1] + '/preview'
        : 'https://docs.google.com/viewer?url=' + encodeURIComponent(pdfUrl) + '&embedded=true';
      document.getElementById('visor-iframe').src = src;
    }

    (function () {
      const usuari = sessionStorage.getItem('usuari') || '?';
      const ara = new Date();
      const data = ara.toLocaleDateString('ca-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const hora = ara.toLocaleTimeString('ca-ES', { hour: '2-digit', minute: '2-digit' });
      const text = usuari + ' · ' + data + ' ' + hora;
      const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="340" height="190">'
        + '<text x="170" y="95" text-anchor="middle" dominant-baseline="middle"'
        + ' transform="rotate(-35 170 95)"'
        + ' font-family="system-ui,-apple-system,sans-serif" font-size="13"'
        + ' fill="rgba(0,0,0,0.07)" font-weight="600">' + text + '</text></svg>';
      const div = document.createElement('div');
      div.setAttribute('aria-hidden', 'true');
      div.style.cssText = 'position:fixed;inset:0;z-index:9999;pointer-events:none;'
        + 'user-select:none;-webkit-user-select:none;'
        + 'background-image:url("data:image/svg+xml,' + encodeURIComponent(svg) + '");'
        + 'background-repeat:repeat;';
      document.body.appendChild(div);
    })();
  </script>
</body>
</html>
