<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Notícies — INS Apel·les Mestres">
  <title>Notícies — INS Apel·les Mestres</title>
  <link rel="stylesheet" href="css/style.css">
  <script>try{var _t=localStorage.getItem('tema');if(_t)document.documentElement.dataset.tema=_t;}catch(e){}</script>
</head>
<body>

  <div id="login-overlay">
    <div class="login-caixa">
      <img src="img/logo.png" alt="INS Apel·les Mestres" class="login-logo">
      <h2>Treballs de Recerca</h2>
      <p class="login-subtitol">INS Apel·les Mestres</p>
      <button id="btn-google-login" class="login-btn login-btn-google" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Entra amb el compte de l'institut
      </button>
      <p id="login-error" class="login-error" hidden>Només es pot entrar amb un compte @apellesmestres.cat</p>
    </div>
  </div>

  <div id="contingut-principal" hidden>

  <header>
    <div class="header-inner">
      <button id="btn-tema" class="btn-tema" title="Activar mode fosc" aria-label="Activar mode fosc">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <h1>Notícies</h1>
      <img src="img/logo.png" alt="INS Apel·les Mestres" class="header-logo">
    </div>
  </header>

  <nav class="nav-global">
    <div class="nav-inner">
      <a href="index.html" class="btn-nav-back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Treballs de Recerca
      </a>
    </div>
  </nav>

  <main>
    <div id="llista-noticies" class="llista-noticies">
      <p class="loading">Carregant notícies...</p>
    </div>
    <div id="missatge-buit-noticies" class="missatge-buit" hidden>
      Encara no hi ha notícies publicades.
    </div>
    <div id="missatge-error-noticies" class="missatge-error" hidden>
      <strong>Error en carregar les notícies.</strong><br>
      Comprova que la pestanya "Notícies" del full de càlcul és pública.<br>
      <small id="error-detall-noticies"></small>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-esquerra"></div>
      <div class="footer-centre">
        <button class="btn-logout" onclick="logout()">Tancar sessió</button>
      </div>
      <div class="footer-dreta"></div>
    </div>
  </footer>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/noticies.js"></script>
</body>
</html>
